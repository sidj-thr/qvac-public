name: Setup vcpkg cache
description: Normalize vcpkg cache setup for addon workflows.

inputs:
  workdir:
    description: Package working directory
    required: true
  platform:
    description: Build platform
    required: true
  arch:
    description: Build architecture
    required: true
  backend:
    description: filesystem | s3
    required: false
    default: filesystem
  s3-bucket-path:
    description: S3 key prefix (without bucket name) when backend=s3
    required: false
    default: ""
  cache-key-prefix:
    description: Prefix to isolate cache keys
    required: false
    default: addon-vcpkg
  aws-region:
    description: AWS region for S3 cache
    required: false
    default: us-east-1

outputs:
  cache-dir:
    description: Effective vcpkg cache directory
    value: ${{ steps.vars.outputs.cache_dir }}

runs:
  using: composite
  steps:
    - name: Resolve cache directory
      id: vars
      shell: bash
      env:
        INPUT_WORKDIR: ${{ inputs.workdir }}
      run: |
        sanitized=$(printf '%s' "$INPUT_WORKDIR" | tr -cd 'a-zA-Z0-9/_.-')
        if [[ "$sanitized" != "$INPUT_WORKDIR" ]]; then
          echo "::error::workdir contains invalid characters: ${INPUT_WORKDIR}"
          exit 1
        fi
        echo "cache_dir=${sanitized}/vcpkg/cache" >> "$GITHUB_OUTPUT"

    - name: Create cache directory
      shell: bash
      env:
        CACHE_DIR: ${{ steps.vars.outputs.cache_dir }}
      run: mkdir -p "$CACHE_DIR"

    - name: Configure vcpkg binary sources (filesystem)
      if: ${{ inputs.backend == 'filesystem' }}
      shell: bash
      env:
        CACHE_DIR: ${{ steps.vars.outputs.cache_dir }}
      run: echo "VCPKG_BINARY_SOURCES=clear;files,${GITHUB_WORKSPACE}/${CACHE_DIR},readwrite" >> "$GITHUB_ENV"

    - name: Validate S3 cache settings
      if: ${{ inputs.backend == 's3' }}
      shell: bash
      run: |
        if [ -z "${MODEL_S3_BUCKET:-}" ]; then
          echo "::error::MODEL_S3_BUCKET is required when backend=s3"
          exit 1
        fi

    - name: Configure vcpkg binary sources (S3)
      if: ${{ inputs.backend == 's3' }}
      shell: bash
      env:
        S3_PATH: ${{ inputs.s3-bucket-path }}
        INPUT_PLATFORM: ${{ inputs.platform }}
        INPUT_ARCH: ${{ inputs.arch }}
      run: |
        for var in S3_PATH INPUT_PLATFORM INPUT_ARCH; do
          val="${!var}"
          clean=$(printf '%s' "$val" | tr -cd 'a-zA-Z0-9/_.-')
          if [[ "$clean" != "$val" ]]; then
            echo "::error::${var} contains invalid characters"
            exit 1
          fi
        done
        PREFIX="${S3_PATH}"
        if [ -z "${PREFIX}" ]; then
          PREFIX="vcpkg-cache"
        fi
        echo "VCPKG_BINARY_SOURCES=clear;x-aws,s3://${MODEL_S3_BUCKET}/${PREFIX}/${INPUT_PLATFORM}-${INPUT_ARCH}/,readwrite" >> "$GITHUB_ENV"

    - name: Restore filesystem cache
      if: ${{ inputs.backend == 'filesystem' }}
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
      with:
        key: ${{ inputs.cache-key-prefix }}-${{ inputs.platform }}-${{ inputs.arch }}-${{ hashFiles(format('{0}/vcpkg.json', inputs.workdir), format('{0}/vcpkg-configuration.json', inputs.workdir), format('{0}/vcpkg/ports/**', inputs.workdir)) }}
        path: ${{ steps.vars.outputs.cache_dir }}
        restore-keys: ${{ inputs.cache-key-prefix }}-${{ inputs.platform }}-${{ inputs.arch }}-
