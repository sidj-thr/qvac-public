name: On PR Trigger (Stable Diffusion)

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/lib-infer-diffusion/**"
      - ".github/workflows/*diffusion*.yml"
  workflow_dispatch:

  workflow_call:
    secrets:
      NPM_TOKEN:
        required: true
      PAT_TOKEN:
        required: true
      AWS_OIDC_ROLE_ARN:
        required: false
      MODEL_S3_BUCKET:
        required: false
      QASE_API_TOKEN:
        required: false
      LLM_AWS_DEVICE_FARM_PROJECT_ARN:
        required: false
      LLM_ANDROID_DEVICE_POOL_ARN:
        required: false
      LLM_IOS_DEVICE_POOL_ARN:
        required: false
      TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE:
        required: false
      TEST_APP_APPLE_PROVISIONING_PROFILE:
        required: false
      APPLE_P12_PASSWORD:
        required: false
      APPLE_KEYCHAIN_PASSWORD:
        required: false
      APPLE_TEAM_ID:
        required: false

permissions:
  contents: read
  pull-requests: read
  packages: read
  id-token: write

env:
  PKG_DIR: packages/lib-infer-diffusion

jobs:
  authorize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      allowed: ${{ steps.auth.outputs.allowed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Authorize
        id: auth
        uses: ./.github/actions/authorize-pr
        with:
          github-token: ${{ github.token }}

  sanity-checks:
    if: needs.authorize.outputs.allowed == 'true'
    needs: authorize
    runs-on: ubuntu-latest
    steps:
      - name: Run Sanity checks
        uses: tetherto/oss-actions/.github/actions/sanity-checks@4c64bed91fc8eba3a201adb1495e61b4c1a2246d
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          run-integration: ${{ needs.authorize.outputs.allowed == 'true' }}
          workdir: packages/lib-infer-diffusion

  cpp-tests:
    if: needs.authorize.outputs.allowed == 'true'
    needs: [authorize, sanity-checks]
    uses: ./.github/workflows/cpp-tests-diffusion.yml
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    with:
      workdir: packages/lib-infer-diffusion
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  cpp-lint:
    if: needs.authorize.outputs.allowed == 'true'
    uses: tetherto/oss-actions/.github/workflows/cpp-lint.yaml@v1.1.0
    needs: authorize
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      sha: ${{ github.event.pull_request.base.sha }}
      pr_head_sha: ${{ github.event.pull_request.head.sha }}
      workdir: packages/lib-infer-diffusion

  ts-checks:
    if: needs.authorize.outputs.allowed == 'true'
    needs: authorize
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: packages/lib-infer-diffusion
        run: npm install

      - name: Type declaration check
        working-directory: packages/lib-infer-diffusion
        run: npm run test:dts

  prebuild:
    needs: [authorize, sanity-checks]
    if: needs.authorize.outputs.allowed == 'true'
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/prebuilds-lib-infer-diffusion.yml
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      AWS_OIDC_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
      MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  run-integration-tests:
    if: needs.authorize.outputs.allowed == 'true'
    needs: [authorize, prebuild]
    permissions:
      contents: read
      packages: read
      id-token: write
    uses: ./.github/workflows/integration-test-lib-infer-diffusion.yml
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      AWS_OIDC_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
      QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  run-mobile-integration-tests:
    permissions:
      contents: read
      packages: read
      pull-requests: write # Allow commenting on PRs
      id-token: write
    if: needs.authorize.outputs.allowed == 'true'
    needs: [authorize, prebuild]
    uses: ./.github/workflows/integration-mobile-test-lib-infer-diffusion.yml
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      AWS_OIDC_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
      LLM_AWS_DEVICE_FARM_PROJECT_ARN: ${{ secrets.LLM_AWS_DEVICE_FARM_PROJECT_ARN }}
      LLM_ANDROID_DEVICE_POOL_ARN: ${{ secrets.LLM_ANDROID_DEVICE_POOL_ARN }}
      LLM_IOS_DEVICE_POOL_ARN: ${{ secrets.LLM_IOS_DEVICE_POOL_ARN }}
      TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE: ${{ secrets.TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE }}
      TEST_APP_APPLE_PROVISIONING_PROFILE: ${{ secrets.TEST_APP_APPLE_PROVISIONING_PROFILE }}
      APPLE_P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
      APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  merge-guard:
    needs:
      [
        authorize,
        run-integration-tests,
        run-mobile-integration-tests,
        sanity-checks,
        prebuild,
        cpp-tests,
        cpp-lint,
        ts-checks,
      ]
    if: always()
    uses: tetherto/oss-actions/.github/workflows/public-pr.yml@v1.1.0
    permissions:
      contents: read
      pull-requests: write
      packages: read
    with:
      sanity-checks-status: ${{ needs.sanity-checks.result == 'success' }}
      build-status: ${{ needs.prebuild.result == 'success'}}
