name: Reusable CPP Tests Addon

on:
  workflow_call:
    inputs:
      repository:
        description: Repository to checkout
        required: false
        type: string
      ref:
        description: Git ref to checkout
        required: false
        type: string
      workdir:
        description: Package working directory
        required: true
        type: string
      needs_vulkan:
        description: Install Vulkan SDK
        required: false
        type: boolean
        default: true
      extra_generate_flags:
        description: Extra flags for bare-make generate
        required: false
        type: string
        default: ""
      test_models:
        description: >
          JSON array of HuggingFace model specs to download before tests.
          Format per entry: "owner/repo/filename"
          Rename: "owner/repo/filename=output_name"
          Shards: "owner/repo/printf_pattern*count"
        required: false
        type: string
        default: "[]"
    secrets:
      NPM_TOKEN:
        required: true
      PAT_TOKEN:
        required: true
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      MODEL_S3_BUCKET:
        required: false

permissions:
  contents: read

jobs:
  cpp-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            arch: x64
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: windows-11
            platform: windows
            arch: x64
            runner: ai-run-windows11-gpu
    runs-on: ${{ matrix.runner || matrix.os }}
    environment: release
    name: cpp-tests-${{ matrix.platform }}-${{ matrix.arch }}
    env:
      WORKDIR: ${{ inputs.workdir }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Configure npm auth
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: |
          cat > .npmrc <<NPMRC
          registry=https://registry.npmjs.org/
          @qvac:registry=https://registry.npmjs.org/
          @tetherto:registry=https://npm.pkg.github.com/
          //registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
          //npm.pkg.github.com/:_authToken=${{ secrets.PAT_TOKEN }}
          NPMRC

      - name: Configure git auth for private GitHub deps
        shell: bash
        env:
          GIT_PAT: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -n "${GIT_PAT:-}" ]; then
            git config --global url."https://${GIT_PAT}:@github.com/".insteadOf "https://github.com/"
            git config --global url."https://${GIT_PAT}:@github.com/".insteadOf "git@github.com:"
          else
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "https://github.com/"
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "git@github.com:"
          fi

      - name: Install global dependencies
        shell: bash
        run: npm install -g bare bare-make bare-runtime

      - name: Setup addon toolchain
        uses: ./.github/actions/setup-addon-toolchain
        with:
          platform: ${{ matrix.platform == 'windows' && 'win32' || matrix.platform }}
          arch: ${{ matrix.arch }}
          ccache-scope: all-ubuntu
          needs-vulkan: ${{ inputs.needs_vulkan }}
          needs-rust-targets: "false"
          needs-submodules: "false"

      - name: Setup vcpkg cache
        uses: ./.github/actions/setup-vcpkg-cache
        with:
          workdir: ${{ env.WORKDIR }}
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          backend: s3
          s3-bucket-path: vcpkg-cache
          cache-key-prefix: cpp-tests

      - name: Install package dependencies
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: npm install

      - name: Verify Vulkan toolchain (Linux)
        if: ${{ runner.os == 'Linux' && inputs.needs_vulkan }}
        shell: bash
        run: |
          echo "VULKAN_SDK=${VULKAN_SDK:-<unset>}"
          if [ -z "${VULKAN_SDK:-}" ]; then
            echo "::error::VULKAN_SDK is not set"
            exit 1
          fi
          if [ ! -d "${VULKAN_SDK}/include" ]; then
            echo "::error::Vulkan include directory missing at ${VULKAN_SDK}/include"
            exit 1
          fi
          if ! command -v glslc; then
            echo "::error::glslc was not found on PATH"
            exit 1
          fi
          glslc --version

      - name: Download test models
        if: inputs.test_models != '[]'
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        env:
          MODEL_SPECS: ${{ inputs.test_models }}
        run: |
          set -euo pipefail
          HF="https://huggingface.co"
          DEST="models/unit-test"
          mkdir -p "$DEST"

          echo "$MODEL_SPECS" | jq -r '.[]' | while IFS= read -r spec; do
            if [[ "$spec" == *'*'* ]]; then
              count="${spec##*\*}"
              rest="${spec%%\**}"
              repo="${rest%/*}"
              pattern="${rest##*/}"
              echo "Downloading $count shards ($pattern) from $repo..."
              for i in $(seq 1 "$count"); do
                shard=$(printf "$pattern" "$i" "$count")
                curl -L --fail --retry 3 --retry-all-errors --retry-delay 2 \
                  "${HF}/${repo}/resolve/main/${shard}" -o "${DEST}/${shard}"
              done
              continue
            fi

            if [[ "$spec" == *'='* ]]; then
              output="${spec##*=}"
              src="${spec%%=*}"
            else
              src="$spec"
              output=""
            fi

            repo="${src%/*}"
            file="${src##*/}"
            [ -z "$output" ] && output="$file"

            echo "Downloading $file from $repo..."
            curl -L --fail --retry 3 --retry-all-errors --retry-delay 2 \
              "${HF}/${repo}/resolve/main/${file}" -o "${DEST}/${output}"
          done

          echo "Downloaded models:"
          ls -lh "$DEST/"

      - name: Generate C++ build
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: bare-make generate --platform ${{ matrix.platform == 'windows' && 'win32' || matrix.platform }} --arch ${{ matrix.arch }} ${{ inputs.extra_generate_flags }}

      - name: Build C++ targets
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: bare-make build

      - name: Run C++ tests
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: npm run test:cpp
