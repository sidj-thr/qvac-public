# Build-only workflow. Publishing is handled by on-merge-qvac-lib-infer-llamacpp-embed.yml
name: Prebuilds (Embed)

on:
  workflow_dispatch:
    inputs:
      vk-profiling:
        description: "Enable Vulkan profiling"
        type: boolean
        default: false
      workdir:
        description: "Working directory (optional)"
        required: false
        type: string
        default: "packages/qvac-lib-infer-llamacpp-embed"

  workflow_call:
    inputs:
      ref:
        description: "ref"
        type: string
        required: false
      repository:
        type: string
        required: false
        default: "tetherto/qvac"
      vk-profiling:
        description: "Enable Vulkan profiling"
        type: boolean
        required: false
        default: false
      workdir:
        description: "Working directory (optional)"
        required: false
        type: string
        default: "packages/qvac-lib-infer-llamacpp-embed"

permissions:
  contents: read

jobs:
  prebuild:
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/_reusable-prebuilds-addon.yml
    secrets: inherit
    with:
      package_slug: qvac-lib-infer-llamacpp-embed
      workdir: ${{ inputs.workdir || 'packages/qvac-lib-infer-llamacpp-embed' }}
      artifact_prefix: llama-cpp
      repository: ${{ inputs.repository || github.repository }}
      ref: ${{ inputs.ref || github.ref }}
      extra_generate_flags: ${{ inputs.vk-profiling && '-D VK_PROFILING=ON' || '' }}
      needs_vulkan: true
      ccache_scope: arm64-only
