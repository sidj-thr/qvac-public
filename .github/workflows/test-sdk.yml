# QVAC SDK Tests
# Runs desktop and/or mobile (Android/iOS) e2e tests for the SDK package

name: QVAC Tests (sdk)

on:
  workflow_dispatch:
    inputs:
      targets:
        description: "Which platforms to test"
        type: choice
        options:
          - all
          - desktop
          - mobile
          - android
          - ios
        default: desktop
      filter:
        description: "Test filter (comma-separated categories/prefixes, empty = all tests)"
        type: string
      desktop-consumer-timeout:
        description: "Desktop consumer timeout (seconds)"
        type: number
        default: 60
      mobile-consumer-timeout:
        description: "Mobile consumer timeout (seconds)"
        type: number
        default: 600
      device-farm-timeout:
        description: "Device Farm session timeout (minutes)"
        type: number
        default: 30
      desktop-platforms:
        description: "JSON array of runner labels for desktop tests"
        type: string
        default: '["ai-run-windows11-gpu", "ai-run-linux-gpu", "macos-latest-xlarge"]'
      test-version:
        description: "Git ref to checkout for the tested project (branch, tag, or SHA). Defaults to current branch HEAD."
        type: string
      cache-models:
        description: "Cache downloaded models between runs"
        type: boolean
        default: true
  # pull_request:
  #   paths:
  #     - "packages/sdk/**"
  #   branches:
  #     - main
  #     - release-*
  # push:
  #   branches:
  #     - main
  #     - release-*
  #     - feature-*
  #     - tmp-*
  #   paths:
  #     - "packages/sdk/**"

permissions:
  contents: read
  pull-requests: write
  packages: read

jobs:
  desktop-tests:
    # Runs for: all, desktop, empty (future PR/push)
    if: inputs.targets != 'mobile' && inputs.targets != 'android' && inputs.targets != 'ios'
    uses: ./.github/workflows/test-desktop-sdk.yml
    with:
      project-directory: "packages/sdk"
      working-directory: "packages/sdk/tests-qvac"
      platforms: ${{ inputs.desktop-platforms || '["ai-run-windows11-gpu", "ai-run-linux-gpu", "macos-latest-xlarge"]' }}
      consumer-timeout: ${{ fromJSON(inputs.desktop-consumer-timeout || '60') }}
      filter: ${{ inputs.filter }}
      test-version: ${{ inputs.test-version || '' }}
      cache-models: ${{ inputs.cache-models }}
    secrets:
      MQTT_PROTOCOL: ${{ secrets.MQTT_PROTOCOL }}
      MQTT_HOST: ${{ secrets.MQTT_HOST }}
      MQTT_PORT: ${{ secrets.MQTT_PORT }}
      MQTT_USERNAME: ${{ secrets.MQTT_USERNAME }}
      MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
      MQTT_CA_CERT: ${{ secrets.MQTT_CA_CERT }}
      MQTT_CLIENT_CERT: ${{ secrets.MQTT_CLIENT_CERT }}
      MQTT_CLIENT_KEY: ${{ secrets.MQTT_CLIENT_KEY }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  android-tests:
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      packages: read
    # Runs for: all, mobile, android, empty (future PR/push)
    if: inputs.targets != 'desktop' && inputs.targets != 'ios'
    uses: ./.github/workflows/test-android-sdk.yml
    with:
      project-directory: "packages/sdk"
      working-directory: "packages/sdk/tests-qvac"
      consumer-timeout: ${{ fromJSON(inputs.mobile-consumer-timeout || '600') }}
      filter: ${{ inputs.filter }}
      device-farm-timeout: ${{ fromJSON(inputs.device-farm-timeout || '90') }}
      device-farm-project-arn: ${{ vars.SDK_DEVICE_FARM_PROJECT_ARN }}
      device-pools: ${{ vars.SDK_DEVICE_FARM_POOLS }}
      test-version: ${{ inputs.test-version || '' }}
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      MQTT_PROTOCOL: ${{ secrets.MQTT_PROTOCOL }}
      MQTT_HOST: ${{ secrets.MQTT_HOST }}
      MQTT_PORT: ${{ secrets.MQTT_PORT }}
      MQTT_USERNAME: ${{ secrets.MQTT_USERNAME }}
      MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
      MQTT_CA_CERT: ${{ secrets.MQTT_CA_CERT }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  ios-tests:
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      packages: read
    # Runs for: all, mobile, ios, empty (future PR/push)
    if: inputs.targets != 'desktop' && inputs.targets != 'android'
    uses: ./.github/workflows/test-ios-sdk.yml
    with:
      project-directory: "packages/sdk"
      working-directory: "packages/sdk/tests-qvac"
      consumer-timeout: ${{ fromJSON(inputs.mobile-consumer-timeout || '600') }}
      filter: ${{ inputs.filter }}
      device-farm-timeout: ${{ fromJSON(inputs.device-farm-timeout || '90') }}
      device-farm-project-arn: ${{ vars.SDK_DEVICE_FARM_PROJECT_ARN }}
      ios-device-pools: ${{ vars.SDK_IOS_DEVICE_FARM_POOLS }}
      test-version: ${{ inputs.test-version || '' }}
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      MQTT_PROTOCOL: ${{ secrets.MQTT_PROTOCOL }}
      MQTT_HOST: ${{ secrets.MQTT_HOST }}
      MQTT_PORT: ${{ secrets.MQTT_PORT }}
      MQTT_USERNAME: ${{ secrets.MQTT_USERNAME }}
      MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
      MQTT_CA_CERT: ${{ secrets.MQTT_CA_CERT }}
      AWS_OIDC_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
      TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE: ${{ secrets.TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE }}
      APPLE_P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
      TEST_APP_APPLE_PROVISIONING_PROFILE: ${{ secrets.TEST_APP_APPLE_PROVISIONING_PROFILE }}
      APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
