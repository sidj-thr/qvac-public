name: On PR Trigger (OCR)

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/ocr-onnx/**"
      - ".github/workflows/*ocr*.yml"
  workflow_dispatch:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: true
      PAT_TOKEN:
        required: true
      AWS_OIDC_ROLE_ARN:
        required: true
      MODEL_S3_BUCKET:
        required: true
      QASE_API_TOKEN:
        required: true
      AWS_DEVICE_FARM_PROJECT_ARN_OCR_FASTTEXT:
        required: true
      ANDROID_DEVICE_POOL_ARN_OCR_FASTTEXT:
        required: true
      IOS_DEVICE_POOL_ARN_OCR_FASTTEXT:
        required: true
      TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE:
        required: true
      TEST_APP_APPLE_PROVISIONING_PROFILE:
        required: true
      APPLE_P12_PASSWORD:
        required: true
      APPLE_KEYCHAIN_PASSWORD:
        required: true
      APPLE_TEAM_ID:
        required: true

permissions:
  contents: read
  pull-requests: read
  packages: read
  id-token: write

jobs:
  authorize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      allowed: ${{ steps.auth.outputs.allowed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Authorize
        id: auth
        uses: ./.github/actions/authorize-pr
        with:
          github-token: ${{ github.token }}

  # Gate the workflow so label events (and other PR_target quirks) don't trigger unrelated packages.
  changes:
    runs-on: ubuntu-latest
    outputs:
      pkg: ${{ steps.filter.outputs.pkg }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # 4.0.1
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            pkg:
              - "packages/ocr-onnx/**"
              - ".github/workflows/*ocr*.yml"

  sanity-checks:
    needs: [authorize, changes]
    if: |
      (needs.changes.outputs.pkg == 'true' &&
       needs.authorize.outputs.allowed == 'true') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    environment: release
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/packages/ocr-onnx/vcpkg/cache,readwrite"
      PKG_DIR: packages/ocr-onnx
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}
          sparse-checkout: |
            packages/ocr-onnx
          fetch-depth: 0

      - name: Fetch PR head and target branch
        id: fetch_pr
        if: github.event_name == 'pull_request_target' || github.event_name == 'pull_request'
        continue-on-error: true
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git fetch origin "$BASE_REF:refs/remotes/origin/$BASE_REF"
          git fetch origin "$HEAD_SHA:refs/pr/head"

      - name: Check PR Status with Target Branch
        continue-on-error: true
        id: target_branch_checks
        if: github.event_name == 'pull_request_target' || github.event_name == 'pull_request'
        env:
          TARGET_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if ! git merge-base --is-ancestor "$TARGET_SHA" "$PR_HEAD_SHA"; then
            echo "::error title=PR is not up to date::This PR is not up to date with target branch"
          fi

      - name: Verify that yaml files are formatted
        id: yamlfmt
        uses: tetherto/oss-actions/.github/actions/yamlfmt@v1.1.0
        continue-on-error: true

      - name: Check for disallowed dependencies
        id: check_dependencies
        continue-on-error: true
        working-directory: ${{ env.PKG_DIR }}
        run: |
          deps=$(jq -r '.dependencies, .devDependencies // {} | to_entries[] | .value' package.json)
          if echo "$deps" | grep -Eq '^(git\+https:\/\/github.com|[0-9]+\.[0-9]+\.[0-9]+-(dev|tmp)[^"]*)$'; then
            echo "::error title=Disallowed dependency detected::Do not use git URLs or dev/tmp versions in dependencies"
          fi

      - name: Run JavaScript tests
        id: run_js_tests
        continue-on-error: true
        uses: tetherto/oss-actions/.github/actions/run-lint-and-unit-tests@4c64bed91fc8eba3a201adb1495e61b4c1a2246d
        with:
          gpr-token: ${{ secrets.GITHUB_TOKEN }}
          registry-type: gpr
          workdir: ${{ env.PKG_DIR }}

      - name: Check for errors
        run: |
          count=0
          if [ "${{ steps.run_js_tests.outcome }}" = "failure" ]; then
            echo "::error::Step - Lint or unit tests failed"
            count=$((count + 1))
          fi
          if [ "${{ steps.yamlfmt.outcome }}" = "failure" ]; then
            echo "::error::Step - Verify that yaml files are formatted failed"
            count=$((count + 1))
          fi
          if [ "${{ steps.check_dependencies.outcome }}" = "failure" ]; then
            echo "::error::Step - Check for disallowed dependencies failed"
            count=$((count + 1))
          fi
          if [ "${{ steps.target_branch_checks.outcome }}" = "failure" ]; then
            echo "::error::Step - Check PR Status with Target Branch failed"
            count=$((count + 1))
          fi
          if [ "${{ steps.fetch_pr.outcome }}" = "failure" ]; then
            echo "::error::Step - Fetch PR head and target branch failed"
            count=$((count + 1))
          fi
          if [ $count -gt 0 ]; then
            echo "::error::There were $count failed checks"
            exit 1
          fi

  cpp-lint:
    needs: [authorize, changes]
    if: needs.authorize.outputs.allowed == 'true' || github.event_name == 'workflow_dispatch'
    uses: tetherto/oss-actions/.github/workflows/cpp-lint.yaml@v1.1.0
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      sha: ${{ github.event.pull_request.base.sha || github.sha }}
      pr_head_sha: ${{ github.event.pull_request.head.sha }}
      workdir: packages/ocr-onnx

  prebuild:
    permissions:
      contents: write
      pull-requests: write
      packages: write
      id-token: write
    needs: [authorize, changes]
    if: |
      (needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch') &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.authorize.outputs.allowed == 'true'
      )
    uses: ./.github/workflows/prebuilds-ocr-onnx.yml
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      AWS_OIDC_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
      MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      ref: ${{ github.event.pull_request.head.ref || github.ref }}

  run-integration-tests:
    permissions:
      contents: read
      packages: read
      id-token: write
    needs: [authorize, changes, prebuild]
    if: |
      (needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch') &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.authorize.outputs.allowed == 'true'
      )
    uses: ./.github/workflows/integration-test-ocr-onnx.yml
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      AWS_OIDC_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
      MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
      QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      ref: ${{ github.event.pull_request.head.ref || github.ref }}

  run-mobile-integration-tests:
    permissions:
      contents: read
      packages: read
      pull-requests: write # Allow commenting on PRs
      id-token: write
    needs: [authorize, changes, prebuild]
    if: |
      (needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch') &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.authorize.outputs.allowed == 'true'
      )
    uses: ./.github/workflows/integration-mobile-test-ocr-onnx.yml
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      AWS_OIDC_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
      MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
      AWS_DEVICE_FARM_PROJECT_ARN_OCR_FASTTEXT: ${{ secrets.AWS_DEVICE_FARM_PROJECT_ARN_OCR_FASTTEXT }}
      ANDROID_DEVICE_POOL_ARN_OCR_FASTTEXT: ${{ secrets.ANDROID_DEVICE_POOL_ARN_OCR_FASTTEXT }}
      IOS_DEVICE_POOL_ARN_OCR_FASTTEXT: ${{ secrets.IOS_DEVICE_POOL_ARN_OCR_FASTTEXT }}
      TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE: ${{ secrets.TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE }}
      TEST_APP_APPLE_PROVISIONING_PROFILE: ${{ secrets.TEST_APP_APPLE_PROVISIONING_PROFILE }}
      APPLE_P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
      APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      ref: ${{ github.event.pull_request.head.ref || github.ref }}

  merge-guard:
    needs: [authorize, changes, sanity-checks, prebuild, run-integration-tests, run-mobile-integration-tests]
    if: always() && (needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch')
    uses: tetherto/oss-actions/.github/workflows/public-pr.yml@v1.1.0
    with:
      sanity-checks-status: ${{ needs.sanity-checks.result == 'success' }}
      build-status: ${{ needs.prebuild.result == 'success' }}
      integration-tests-status: ${{ needs.run-integration-tests.result == 'success' }}
